services:
  # ── Django Backend ──────────────────────────────────────────────────────────
  - type: web
    name: ai-career-mentor-backend
    runtime: python
    rootDir: backend
    buildCommand: "./build.sh"
    startCommand: "gunicorn core.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
    plan: free
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: ai-career-mentor-db
          property: connectionString
      - key: FRONTEND_URL
        value: "https://ai-career-mentor.onrender.com"
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: ADZUNA_APP_ID
        value: "e8f35901"
      - key: ADZUNA_APP_KEY
        value: "c0f126251d3d80b02f3a1a8b2035b1c8"
      - key: PYTHON_VERSION
        value: "3.12.3"

  # ── Next.js Frontend ────────────────────────────────────────────────────────
  - type: web
    name: ai-career-mentor
    runtime: node
    rootDir: .
    buildCommand: "npm install && npm run build"
    startCommand: "node .next/standalone/server.js"
    plan: free
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: "https://ai-career-mentor-backend.onrender.com/api"
      - key: NODE_VERSION
        value: "20.18.0"
      - key: PORT
        value: "3000"

# ── PostgreSQL Database ─────────────────────────────────────────────────────
databases:
  - name: ai-career-mentor-db
    plan: free
    databaseName: careermentor
    user: careermentor
