services:
  # ── Django Backend ──────────────────────────────────────────────────────────
  - type: web
    name: ai-career-mentor-backend
    runtime: python
    rootDir: backend
    buildCommand: "./build.sh"
    startCommand: "gunicorn core.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
    plan: free
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: ai-career-mentor-db
          property: connectionString
      - key: FRONTEND_URL
        value: "https://ai-career-mentor.onrender.com"
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: SERPER_API_KEY
        sync: false

  # ── Next.js Frontend ────────────────────────────────────────────────────────
  - type: web
    name: ai-career-mentor
    runtime: node
    rootDir: .
    buildCommand: "npm install && npm run build"
    startCommand: "npm start"
    plan: free
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: "https://ai-career-mentor-backend.onrender.com/api"
      - key: GROQ_API_KEY
        sync: false

# ── PostgreSQL Database ─────────────────────────────────────────────────────
databases:
  - name: ai-career-mentor-db
    plan: free
    databaseName: careermentor
    user: careermentor
